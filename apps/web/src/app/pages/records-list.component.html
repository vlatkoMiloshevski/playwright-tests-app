<section class="page">
    <h1>Records</h1>

    <table data-testid="records-table" class="records-table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Type</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            @for (record of records$ | async; track record.id) {
            <tr [attr.data-testid]="'record-row-' + record.id" (click)="openRecord(record.id)">
                <td>{{ record.id }}</td>
                <td>{{ record.name }}</td>
                <td>{{ record.type }}</td>
                <td>{{ record.status }}</td>
            </tr>
            }
        </tbody>
    </table>
</section>
